<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシートOCR家計簿（試作）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { text-align: center; color: #4A5568; }
        .upload-area { border: 2px dashed #CBD5E0; padding: 30px; text-align: center; background: #F7FAFC; border-radius: 8px; cursor: pointer; }
        #preview { max-width: 100%; max-height: 300px; margin-top: 20px; display: none; border-radius: 4px; }
        #status { font-weight: bold; margin: 20px 0; color: #3182CE; text-align: center; }
        .result-box { background: #EDF2F7; padding: 20px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; display: none; }
    </style>
</head>
<body>

    <h1>レシート読み取り家計簿</h1>
    
    <div class="upload-area" onclick="document.getElementById('image-input').click()">
        <p>ここをクリックしてレシート画像を選択<br>(またはカメラで撮影)</p>
        <input type="file" id="image-input" accept="image/*" style="display:none">
    </div>

    <div style="text-align: center;">
        <img id="preview" alt="レシートプレビュー">
    </div>

    <p id="status"></p>

    <h2>読み取り結果:</h2>
    <div id="result" class="result-box"></div>

    <script>
        const imageInput = document.getElementById('image-input');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');
        const resultBox = document.getElementById('result');

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 画像のプレビュー表示
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);

            // 2. OCR処理の開始
            status.innerText = "文字を認識中...（数秒かかります）";
            resultBox.style.display = 'none';

            try {
                // Tesseract.jsで日本語('jpn')と英語('eng')を対象に認識
                const result = await Tesseract.recognize(
                    file,
                    'jpn+eng',
                    { logger: m => {
                        // 進捗をコンソールに表示（必要に応じて進捗バーを作れます）
                        if(m.status === 'recognizing text') {
                            status.innerText = `文字を認識中... ${Math.round(m.progress * 100)}%`;
                        }
                    }}
                );

                // 3. 結果の出力
                status.innerText = "認識完了！";
                resultBox.innerText = result.data.text;
                resultBox.style.display = 'block';

            } catch (error) {
                console.error(error);
                status.innerText = "読み取りに失敗しました。";
            }
        });
    </script>
</body>
</html>
